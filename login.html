<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetBrain - Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Your existing styles – same as before, no changes */
    :root {
      --accent-primary: #4f46e5;
      --accent-secondary: #7c3aed;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --accent-warning: #f59e0b;
      --bg: #f0f2f8;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(148,163,184,0.25);
      --radius: 20px;
      --font-brand: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: auto;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent-primary);
      top: -150px; left: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--accent-secondary);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px, 20px) scale(1.05); }
    }
    .auth-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(15,23,42,0.10), 0 4px 12px rgba(15,23,42,0.06);
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      overflow: hidden;
      margin: 1rem 0;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
    }
    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.75rem; color: white;
      box-shadow: 0 8px 24px rgba(79,70,229,0.30);
      margin-bottom: 1rem;
    }
    .auth-logo h1 {
      font-family: var(--font-brand);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }
    .auth-logo p {
      font-size: 0.8125rem;
      color: var(--muted);
      font-weight: 500;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      gap: 0;
    }
    .auth-tab {
      flex: 1;
      padding: 0.875rem 0;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.25s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .auth-tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }
    .auth-tab:hover:not(.active) {
      color: var(--text);
    }
    .auth-panel { display: none; padding: 2rem; }
    .auth-panel.active { display: block; }
    .form-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.5rem;
    }
    .input-group-text {
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-right: none;
      color: var(--muted);
      font-size: 1rem;
      border-radius: 14px 0 0 14px;
    }
    .form-control {
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0.8rem 1rem;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      background: #f8fafc;
      transition: all 0.2s;
    }
    .input-group .form-control {
      border-left: none;
      border-radius: 0 14px 14px 0;
    }
    .form-control:focus {
      border-color: var(--accent-primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79,70,229,0.08);
      outline: none;
    }
    .input-group:focus-within .input-group-text {
      border-color: var(--accent-primary);
      background: #fff;
    }
    .pw-wrapper { position: relative; }
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      z-index: 5;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--accent-primary); }
    .strength-bar {
      height: 4px;
      border-radius: 100px;
      background: var(--border);
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 100px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.7rem;
      margin-top: 0.25rem;
      font-weight: 600;
    }
    .btn-auth {
      width: 100%;
      padding: 0.9rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      font-size: 0.9375rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 14px rgba(79,70,229,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,70,229,0.35);
    }
    .btn-auth:active { transform: scale(0.97); }
    .btn-auth:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .auth-alert {
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-size: 0.8375rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-alert.error   { background: rgba(239,68,68,0.08);  color: #b91c1c; border: 1px solid rgba(239,68,68,0.2);  display: flex; }
    .auth-alert.success { background: rgba(16,185,129,0.08); color: #065f46; border: 1px solid rgba(16,185,129,0.2); display: flex; }
    .auth-alert.hidden  { display: none !important; }
    .auth-divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin: 1.25rem 0;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after  { right: 0; }
    .auth-footer {
      text-align: center;
      padding: 1.25rem 2rem 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 3rem 2rem;
    }
    .success-screen.show { display: flex; }
    .success-icon {
      width: 72px; height: 72px;
      background: rgba(16,185,129,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--accent-success);
      margin-bottom: 1rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <h1>BudgetBrain</h1>
      <p>Smart Finance Manager &mdash; PKR</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">
        <i class="bi bi-person-plus"></i> Create Account
      </button>
    </div>

    <!-- SIGN IN PANEL -->
    <div class="auth-panel active" id="panelSignIn">
      <div class="auth-alert hidden" id="loginAlert"></div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="pw-wrapper">
          <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" style="border-radius:14px;padding-right:3rem;">
          <button class="pw-toggle" onclick="togglePw('loginPassword', this)" type="button" tabindex="-1">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button class="btn-auth" id="btnSignIn" onclick="handleSignIn()">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
      <div class="auth-divider">or</div>
      <div style="text-align:center;font-size:0.85rem;color:var(--muted)">
        Don't have an account?
        <a href="#" onclick="switchTab('register')" style="color:var(--accent-primary);font-weight:600;text-decoration:none;">Create one free</a>
      </div>
    </div>

    <!-- REGISTER PANEL -->
    <div class="auth-panel" id="panelRegister">
      <div class="auth-alert hidden" id="registerAlert"></div>

      <!-- Success screen (shown after registration) -->
      <div class="success-screen" id="registerSuccess">
        <div class="success-icon"><i class="bi bi-check-lg"></i></div>
        <h5 style="font-family:var(--font-brand);font-weight:700;color:var(--text);margin-bottom:0.5rem;">Account Created!</h5>
        <p style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem;">Please sign in with your email and password.</p>
        <button class="btn-auth" id="gotoSignInBtn" style="width:auto;padding:0.5rem 1.5rem;background:linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));margin-top:0;">
          <i class="bi bi-box-arrow-in-right"></i> Go to Sign In
        </button>
      </div>

      <div id="registerFormBody">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="regUsername" placeholder="e.g. Ahmed Khan" autocomplete="name">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" autocomplete="email">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Monthly Income (PKR)</label>
          <div class="input-group">
            <span class="input-group-text">₨</span>
            <input type="number" class="form-control" id="regIncome" placeholder="e.g. 150000" min="0" step="1000">
          </div>
        </div>
        <div class="mb-1">
          <label class="form-label">Password</label>
          <div class="pw-wrapper">
            <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" style="border-radius:14px;padding-right:3rem;" oninput="checkStrength(this.value)">
            <button class="pw-toggle" onclick="togglePw('regPassword', this)" type="button" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel" style="color:var(--muted)"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <div class="pw-wrapper">
            <input type="password" class="form-control" id="regConfirm" placeholder="Re-enter password" autocomplete="new-password" style="border-radius:14px;padding-right:3rem;">
            <button class="pw-toggle" onclick="togglePw('regConfirm', this)" type="button" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button class="btn-auth" id="btnRegister" onclick="handleRegister()">
          <i class="bi bi-person-check"></i> Create Account
        </button>
        <div class="auth-divider">or</div>
        <div style="text-align:center;font-size:0.85rem;color:var(--muted)">
          Already have an account?
          <a href="#" onclick="switchTab('signin')" style="color:var(--accent-primary);font-weight:600;text-decoration:none;">Sign in</a>
        </div>
      </div>
    </div>

    <div class="auth-footer">
      <i class="bi bi-shield-lock"></i> Your data is stored securely.
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000/api';

    // If already logged in, go to dashboard
    if (localStorage.getItem('bb_user_id')) {
      window.location.href = 'index.html';
    }

    // Tab switching
    function switchTab(tab) {
      document.getElementById('panelSignIn').classList.remove('active');
      document.getElementById('panelRegister').classList.remove('active');
      document.getElementById('tabSignIn').classList.remove('active');
      document.getElementById('tabRegister').classList.remove('active');
      hideAlert('loginAlert');
      hideAlert('registerAlert');
      if (tab === 'signin') {
        document.getElementById('panelSignIn').classList.add('active');
        document.getElementById('tabSignIn').classList.add('active');
      } else {
        document.getElementById('panelRegister').classList.add('active');
        document.getElementById('tabRegister').classList.add('active');
      }
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.className = `auth-alert ${type}`;
      el.innerHTML = `<i class="bi ${type === 'error' ? 'bi-exclamation-circle' : 'bi-check-circle'}"></i> ${msg}`;
    }
    function hideAlert(id) {
      document.getElementById(id).className = 'auth-alert hidden';
    }

    function togglePw(inputId, btn) {
      const inp = document.getElementById(inputId);
      const isText = inp.type === 'text';
      inp.type = isText ? 'password' : 'text';
      btn.innerHTML = `<i class="bi ${isText ? 'bi-eye' : 'bi-eye-slash'}"></i>`;
    }

    function checkStrength(pw) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!pw) { fill.style.width = '0%'; label.textContent = ''; return; }
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = [
        { w:'20%', c:'#ef4444', t:'Weak' },
        { w:'40%', c:'#f97316', t:'Fair' },
        { w:'60%', c:'#f59e0b', t:'Good' },
        { w:'80%', c:'#3b82f6', t:'Strong' },
        { w:'100%',c:'#10b981', t:'Very Strong' }
      ];
      const lvl = levels[Math.min(score, 4)];
      fill.style.width = lvl.w;
      fill.style.background = lvl.c;
      label.style.color = lvl.c;
      label.textContent = lvl.t;
    }

    // SIGN IN (unchanged)
    async function handleSignIn() {
      hideAlert('loginAlert');
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showAlert('loginAlert', 'Please enter your email and password.', 'error'); return;
      }

      const btn = document.getElementById('btnSignIn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          showAlert('loginAlert', data.error || 'Sign in failed. Please try again.', 'error');
          return;
        }

        localStorage.setItem('bb_user_id',   data.user_id);
        localStorage.setItem('bb_username',  data.username);
        localStorage.setItem('bb_email',     data.email);
        localStorage.setItem('bb_monthly_income', data.monthly_income);

        showAlert('loginAlert', `Welcome back, ${data.username}! Redirecting...`, 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 900);

      } catch (err) {
        showAlert('loginAlert', 'Cannot connect to server. Make sure app.py is running.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
      }
    }

    // REGISTER (modified: does NOT auto-login, shows success screen then switch to sign-in)
    async function handleRegister() {
      hideAlert('registerAlert');
      const username       = document.getElementById('regUsername').value.trim();
      const email          = document.getElementById('regEmail').value.trim();
      const monthly_income = parseFloat(document.getElementById('regIncome').value);
      const password       = document.getElementById('regPassword').value;
      const confirm        = document.getElementById('regConfirm').value;

      if (!username || !email || !password || !confirm || isNaN(monthly_income)) {
        showAlert('registerAlert', 'Please fill in all fields.', 'error'); return;
      }
      if (!email.includes('@')) {
        showAlert('registerAlert', 'Please enter a valid email address.', 'error'); return;
      }
      if (password.length < 6) {
        showAlert('registerAlert', 'Password must be at least 6 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showAlert('registerAlert', 'Passwords do not match.', 'error'); return;
      }
      if (monthly_income <= 0) {
        showAlert('registerAlert', 'Please enter a valid monthly income.', 'error'); return;
      }

      const btn = document.getElementById('btnRegister');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';

      try {
        const res  = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, monthly_income })
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          showAlert('registerAlert', data.error || 'Registration failed. Please try again.', 'error');
          return;
        }

        // Registration successful – show success screen and clear any existing localStorage
        localStorage.removeItem('bb_user_id');
        localStorage.removeItem('bb_username');
        localStorage.removeItem('bb_email');
        localStorage.removeItem('bb_monthly_income');

        // Hide registration form, show success screen
        document.getElementById('registerFormBody').style.display = 'none';
        document.getElementById('registerSuccess').classList.add('show');

        // Set up button to go to sign-in tab
        document.getElementById('gotoSignInBtn').onclick = () => {
          switchTab('signin');
          // Reset form visibility for next registration
          document.getElementById('registerFormBody').style.display = 'block';
          document.getElementById('registerSuccess').classList.remove('show');
          // Clear form fields
          document.getElementById('regUsername').value = '';
          document.getElementById('regEmail').value = '';
          document.getElementById('regIncome').value = '';
          document.getElementById('regPassword').value = '';
          document.getElementById('regConfirm').value = '';
          document.getElementById('strengthFill').style.width = '0%';
          document.getElementById('strengthLabel').textContent = '';
        };

      } catch (err) {
        showAlert('registerAlert', 'Cannot connect to server. Make sure app.py is running.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-check"></i> Create Account';
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const signinActive = document.getElementById('panelSignIn').classList.contains('active');
      if (signinActive) handleSignIn();
      else handleRegister();
    });
  </script>
</body>
</html>
